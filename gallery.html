<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumtech Gateway | Graphic Design Gallery - Flyers, Posters & Banners</title>
    <meta name="description" content="Explore our graphic design portfolio featuring flyers, posters, social media graphics, and banners created for businesses in Cameroon.">
    <meta name="robots" content="index, follow">
    <link rel="alternate" hreflang="en" href="https://kumtechgateway.com/gallery.html" />
    <link rel="alternate" hreflang="x-default" href="https://kumtechgateway.com/gallery.html" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preload" as="image" href="images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [{
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://kumtechgateway.com/"
      },{
        "@type": "ListItem",
        "position": 2,
        "name": "Gallery",
        "item": "https://kumtechgateway.com/gallery.html"
      }]
    }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'cyan': '#00B4D8',
                        'tech-blue': '#1F3C88',
                        'charcoal': '#0F172A',
                        'soft-gray': '#F1F5F9',
                        'orange': '#F97316',
                        'soft-amber': '#FDBA74',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                    boxShadow: {
                        'custom': '0 5px 15px rgba(39, 17, 9, 0.08)',
                        'custom-hover': '0 15px 30px rgba(39, 17, 9, 0.15)',
                    }
                }
            },
            plugins: [
                function({ addVariant }) {
                    addVariant('active', '&.active');
                }
            ]
        }
    </script>
</head>
<body class="font-sans text-charcoal bg-white overflow-x-hidden leading-relaxed dark:bg-charcoal dark:text-white transition-colors duration-300">
    <!-- Custom Cursor -->
    <div id="cursor-dot" class="hidden md:block"></div>
    <div id="cursor-outline" class="hidden md:block"></div>

    <!-- Navigation Placeholder -->
    <header id="navbar-placeholder"></header>

    <main>
       <section class="pb-16 md:pb-24 relative dark:bg-charcoal" id="gallery">
            <!-- Controls -->
            <div class="sticky top-[64px] md:top-[80px] z-40 bg-white/90 dark:bg-charcoal/90 backdrop-blur-md py-3 md:py-4 mb-8 md:mb-10 flex justify-center items-center gap-3 transition-all w-full border-b border-tech-blue/10 dark:border-white/10 shadow-sm">
                <div class="flex flex-wrap justify-center gap-2">
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white active:bg-gradient-to-r active:from-orange active:to-soft-amber active:text-white active:border-orange active" data-filter="all">All</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white active:bg-gradient-to-r active:from-orange active:to-soft-amber active:text-white active:border-orange" data-filter="flyer">Flyers</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white active:bg-gradient-to-r active:from-orange active:to-soft-amber active:text-white active:border-orange" data-filter="poster">Posters</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white active:bg-gradient-to-r active:from-orange active:to-soft-amber active:text-white active:border-orange" data-filter="social-media">Social Media</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white active:bg-gradient-to-r active:from-orange active:to-soft-amber active:text-white active:border-orange" data-filter="banner">Banners</button>
                </div>
            </div>

            <div class="container mx-auto px-5 max-w-[1200px] mt-36 md:mt-24">
                <div class="columns-1 sm:columns-2 lg:columns-3 gap-6 portfolio-grid">
                    <!-- Images will be loaded here by the script -->
                </div>
                
                <div class="text-center mt-12">
                    <!-- Sentinel element for Virtual Scroll -->
                    <div id="gallery-sentinel" class="w-full h-20 flex items-center justify-center">
                        <div class="w-8 h-8 border-4 border-tech-blue border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
           </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
    
    <!-- Back to Top Button (Desktop) -->
    <button id="backToTop" class="hidden md:flex fixed bottom-8 right-8 w-12 h-12 bg-gradient-to-r from-orange to-soft-amber text-white rounded-full items-center justify-center text-lg shadow-custom cursor-pointer transition-all duration-300 opacity-0 invisible translate-y-5 hover:bg-tech-blue hover:from-tech-blue hover:to-tech-blue hover:-translate-y-1 z-50" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- WhatsApp Button (Mobile) -->
    <a href="https://wa.me/237679796638" id="whatsappMobileBtn" target="_blank" rel="noopener noreferrer" class="md:hidden fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-r from-orange to-soft-amber text-white rounded-full flex items-center justify-center text-2xl shadow-lg cursor-pointer transition-all duration-300 opacity-0 invisible translate-y-5 hover:bg-tech-blue hover:from-tech-blue hover:to-tech-blue hover:-translate-y-1 z-50" aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[120] bg-black/90 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <button id="closeLightbox" class="absolute top-6 right-6 text-white/70 hover:text-white text-4xl transition-colors cursor-pointer z-50">
            <i class="fas fa-times"></i>
        </button>
        <button id="prevLightboxBtn" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 text-white/70 hover:text-white text-3xl md:text-5xl transition-colors cursor-pointer z-50 p-4">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button id="nextLightboxBtn" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 text-white/70 hover:text-white text-3xl md:text-5xl transition-colors cursor-pointer z-50 p-4">
            <i class="fas fa-chevron-right"></i>
        </button>
        <img id="lightboxImage" src="" alt="Gallery Image" class="max-w-[90vw] max-h-[90vh] object-contain transform scale-95 transition-all duration-300 select-none">
    </div>

    <script src="gallery-data.js" defer></script>
    <script src="script.js"></script>

</body>
</html>
