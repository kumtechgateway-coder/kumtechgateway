    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'cyan': '#00B4D8',
                        'tech-blue': '#1F3C88',
                        'charcoal': '#0F172A',
                        'soft-gray': '#F1F5F9',
                        'orange': '#F97316',
                        'soft-amber': '#FDBA74',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                    boxShadow: {
                        'custom': '0 5px 15px rgba(39, 17, 9, 0.08)',
                        'custom-hover': '0 15px 30px rgba(39, 17, 9, 0.15)',
                    }
                }
            },
            plugins: [
                function({ addVariant }) {
                    addVariant('open', '&.active');

            ]
        }

</head>
<body class="font-sans text-charcoal bg-white overflow-x-hidden leading-relaxed dark:bg-charcoal dark:text-white transition-colors duration-300">
    <!-- Custom Cursor -->
    <div id="cursor-dot" class="hidden md:block"></div>
    <div id="cursor-outline" class="hidden md:block"></div>

    <!-- Navigation Placeholder -->
    <header id="navbar-placeholder"></header>

    <main>
       <section class="pt-28 md:pt-40 pb-16 md:pb-24 relative dark:bg-charcoal" id="gallery">
            <div class="container mx-auto px-5 max-w-[1200px]">
                <div class="text-center mb-12">
                   <h1 class="font-heading text-3xl md:text-4xl font-semibold text-tech-blue dark:text-white mb-4 relative inline-block after:content-[''] after:absolute after:-bottom-2.5 after:left-1/2 after:-translate-x-1/2 after:w-20 after:h-1 after:bg-gradient-to-r after:from-tech-blue after:to-cyan after:rounded-sm reveal-up">Creative Graphic Design Gallery</h1>
                   <p class="text-lg text-cyan max-w-xl mx-auto reveal-up delay-200">Explore our collection of flyers, posters, and social media designs.</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="sticky top-[64px] md:top-[80px] z-40 bg-white/90 dark:bg-charcoal/90 backdrop-blur-md py-3 md:py-4 mb-8 md:mb-10 flex justify-center items-center gap-3 reveal-up delay-300 transition-all w-full border-b border-tech-blue/10 dark:border-white/10 shadow-sm">
                <div class="flex flex-wrap justify-center gap-2">
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white open:bg-gradient-to-r open:from-orange open:to-soft-amber open:text-white open:border-orange active" data-filter="all">All</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white open:bg-gradient-to-r open:from-orange open:to-soft-amber open:text-white open:border-orange" data-filter="flyers">Flyers</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white open:bg-gradient-to-r open:from-orange open:to-soft-amber open:text-white open:border-orange" data-filter="posters">Posters</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white open:bg-gradient-to-r open:from-orange open:to-soft-amber open:text-white open:border-orange" data-filter="social-media">Social Media</button>
                    <button class="filter-btn px-4 py-2 md:px-5 md:py-2 text-sm rounded-full border border-tech-blue/30 dark:border-white/20 text-charcoal dark:text-gray-300 cursor-pointer transition-all font-medium hover:bg-gradient-to-r hover:from-orange hover:to-soft-amber hover:text-white hover:border-orange dark:hover:text-white open:bg-gradient-to-r open:from-orange open:to-soft-amber open:text-white open:border-orange" data-filter="banners">Banners</button>
                </div>
            </div>

            <div class="container mx-auto px-5 max-w-[1200px]">
                <div class="columns-1 sm:columns-2 lg:columns-3 gap-6 portfolio-grid">
                    <!-- Images will be loaded here by the script -->
                </div>
                
                <div class="text-center mt-12">
                    <!-- Sentinel element for Virtual Scroll -->
                    <div id="gallery-sentinel" class="w-full h-20 flex items-center justify-center">
                        <div class="w-8 h-8 border-4 border-tech-blue border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
           </div>
        </section>
    </main>

    <!-- Virtual Scroll / Infinite Load Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.querySelector('.portfolio-grid');
            const sentinel = document.getElementById('gallery-sentinel');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            if(grid && sentinel && filterBtns.length > 0) {
                // Observer for revealing newly loaded items
                const itemRevealObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                // 1. Define all images based on user specification
                const allImages = [];
                // Flyers (1 to 88)
                for (let i = 1; i <= 88; i++) {
                    allImages.push({ category: 'flyers', prefix: 'flyer', index: i });
                }
                // Banners (1)
                allImages.push({ category: 'banners', prefix: 'banner', index: 1 });
                // Posters (1 to 4)
                for (let i = 1; i <= 4; i++) {
                    allImages.push({ category: 'posters', prefix: 'poster', index: i });
                }
                // Social Media (1)
                allImages.push({ category: 'social-media', prefix: 'socialmedia', index: 1 });

                let displayImages = []; // This will be the array we render from
                let loadedCount = 0;
                const batchSize = 12;

                // 2. Shuffle function
                function shuffle(array) {
                    for (let i = array.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [array[i], array[j]] = [array[j], array[i]];
                    }
                }

                const renderBatch = (start, end) => {
                    const fragment = document.createDocumentFragment();
                    const batch = displayImages.slice(start, end);

                    batch.forEach((imgData, i) => {
                        const { category, prefix, index } = imgData;
                        const delay = ['delay-100', 'delay-200', 'delay-300'][i % 3];
                        const categoryTitle = category.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        const imageName = `${prefix}${index}`;
                        
                        const div = document.createElement('div');
                        div.className = `group bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-tech-blue/10 dark:border-white/5 shadow-lg hover:shadow-2xl transition-all duration-500 hover:-translate-y-2 flex flex-col portfolio-card reveal-up ${delay} mb-6 break-inside-avoid`;
                        div.setAttribute('data-category', category);
                        div.innerHTML = `
                            <div class="w-full relative skeleton aspect-[3/4]">
                                <img src="images/${imageName}.webp" alt="${categoryTitle} Design ${index}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-0 transition-opacity duration-500" width="600" height="800" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='https://placehold.co/600x800?text=Image+Unavailable';this.parentElement.classList.remove('skeleton');this.classList.remove('opacity-0')" onload="this.parentElement.classList.remove('skeleton');this.classList.remove('opacity-0')">
                            </div>
                            <div class="hidden portfolio-title">${categoryTitle} Design ${index}</div>
                            <div class="hidden portfolio-description">Creative ${categoryTitle.toLowerCase()} design</div>
                        `;
                        fragment.appendChild(div);
                        itemRevealObserver.observe(div);
                    });

                    grid.appendChild(fragment);
                };

                const loadNextBatch = () => {
                    if (loadedCount >= displayImages.length) {
                        sentinel.style.display = 'none'; // All images loaded
                        return;
                    }
                    sentinel.style.display = 'flex';

                    const nextLimit = Math.min(loadedCount + batchSize, displayImages.length);
                    renderBatch(loadedCount, nextLimit);
                    loadedCount = nextLimit;
                };

                // Intersection Observer for Infinite Scroll
                const observer = new IntersectionObserver((entries) => {
                    if(entries[0].isIntersecting) {
                        // Small delay to simulate network and show spinner
                        setTimeout(loadNextBatch, 500);
                    }
                }, { rootMargin: '200px' });

                function applyFilter(filter) {
                    grid.innerHTML = '';
                    loadedCount = 0;

                    if (filter === 'all') {
                        displayImages = [...allImages];
                        shuffle(displayImages);
                    } else {
                        displayImages = allImages
                            .filter(img => img.category === filter)
                            .sort((a, b) => a.index - b.index);
                    }
                    loadNextBatch();
                }

                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const newFilter = btn.dataset.filter;
                        applyFilter(newFilter);
                    });
                });

                // Initial Load
                applyFilter('all');
                observer.observe(sentinel);
            }
        });
    </script>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

            <i class="fas fa-chevron-left"></i>

        <button id="nextLightboxBtn" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 text-white/70 hover:text-white text-3xl md:text-5xl transition-colors cursor-pointer z-50 p-4">

        <img id="lightboxImage" src="" alt="Gallery Image" class="max-w-[90vw] max-h-[90vh] object-contain transform scale-95 transition-all duration-300 select-none">
    </div>

    <script src="script.js"></script>
